[build]
  #Le decimos a Netlify dónde tiene que compilar React/Next.js
  base = "client"
  publish = "client/.next" # Si usas Next.js clásico, compila en esta carpeta
  command = "npm run build"

  #Le indicamos la ruta a tu carpeta del Backend
  functions = "api"

[[redirects]]
  #Para que el front se comunique con el back 
  from = "/api/*"
  to = "/.netlify/functions/index/:splat"
  status = 200
